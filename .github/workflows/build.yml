name: Build and release desktop apps

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag to create or update (for example v0.1.0)
        required: true
        type: string
      release_name:
        description: Optional release title; defaults to the tag
        required: false
        type: string
      notes:
        description: Optional release notes; leave empty to use GitHub generated notes
        required: false
        type: string
      prerelease:
        description: Mark the release as a prerelease
        required: true
        default: false
        type: boolean
      latest:
        description: Mark the release as latest
        required: true
        default: true
        type: boolean

run-name: Release ${{ inputs.tag }}

permissions:
  contents: write

concurrency:
  group: release-${{ inputs.tag }}
  cancel-in-progress: false

jobs:
  package:
    name: ${{ matrix.artifact }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            artifact: CodexSessionManager-windows-x64
            build_args: --win nsis --x64
            asset_glob: CodexSessionManager-*-windows-x64-setup.exe
          - os: macos-latest
            artifact: CodexSessionManager-macos-x64
            build_args: --mac dmg --x64
            asset_glob: CodexSessionManager-*-macos-x64.dmg
          - os: macos-latest
            artifact: CodexSessionManager-macos-arm64
            build_args: --mac dmg --arm64
            asset_glob: CodexSessionManager-*-macos-arm64.dmg
          - os: ubuntu-latest
            artifact: CodexSessionManager-linux-x64
            build_args: --linux AppImage --x64
            asset_glob: CodexSessionManager-*-linux-*.AppImage

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Package app
        run: npm run dist -- ${{ matrix.build_args }}

      - name: Collect distributable
        shell: bash
        run: |
          set -euo pipefail
          shopt -s nullglob
          mkdir -p release-assets
          matches=(dist/${{ matrix.asset_glob }})
          if [ "${#matches[@]}" -ne 1 ]; then
            echo "Expected exactly one distributable matching ${{ matrix.asset_glob }}." >&2
            ls -lah dist >&2 || true
            exit 1
          fi
          cp "${matches[0]}" release-assets/

      - name: Upload bundle
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact }}
          path: release-assets/*
          if-no-files-found: error

  publish-release:
    name: Publish release
    runs-on: ubuntu-latest
    needs: package

    steps:
      - name: Download packaged bundles
        uses: actions/download-artifact@v5
        with:
          pattern: CodexSessionManager-*
          path: release-assets
          merge-multiple: true

      - name: Show bundled assets
        shell: bash
        run: ls -lah release-assets

      - name: Create or update GitHub release
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          TAG: ${{ inputs.tag }}
          RELEASE_NAME: ${{ inputs.release_name }}
          RELEASE_NOTES: ${{ inputs.notes }}
          PRERELEASE: ${{ inputs.prerelease }}
          MAKE_LATEST: ${{ inputs.latest }}
          TARGET_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          shopt -s nullglob

          assets=(release-assets/*)
          if [ "${#assets[@]}" -eq 0 ]; then
            echo "No packaged release assets were downloaded." >&2
            exit 1
          fi

          create_args=(--target "$TARGET_SHA")
          if [ -n "$RELEASE_NAME" ]; then
            create_args+=(--title "$RELEASE_NAME")
          else
            create_args+=(--title "$TAG")
          fi

          if [ -n "$RELEASE_NOTES" ]; then
            create_args+=(--notes "$RELEASE_NOTES")
          else
            create_args+=(--generate-notes)
          fi

          if [ "$PRERELEASE" = "true" ]; then
            create_args+=(--prerelease)
          fi

          if [ "$MAKE_LATEST" = "true" ]; then
            create_args+=(--latest)
          fi

          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "Release $TAG already exists. Uploading refreshed assets."
            gh release upload "$TAG" "${assets[@]}" --clobber
          else
            echo "Creating release $TAG from $TARGET_SHA."
            gh release create "$TAG" "${assets[@]}" "${create_args[@]}"
          fi
