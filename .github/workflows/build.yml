name: Build and release desktop apps

on:
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag to create or update (for example v0.1.0)
        required: true
        type: string
      release_name:
        description: Optional release title; defaults to the tag
        required: false
        type: string
      notes:
        description: Optional release notes; leave empty to use GitHub generated notes
        required: false
        type: string
      prerelease:
        description: Mark the release as a prerelease
        required: true
        default: false
        type: boolean
      latest:
        description: Mark the release as latest
        required: true
        default: true
        type: boolean

run-name: Release ${{ inputs.tag }}

permissions:
  contents: write

concurrency:
  group: release-${{ inputs.tag }}
  cancel-in-progress: false

jobs:
  package:
    name: ${{ matrix.artifact }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform: win32
            arch: x64
            artifact: CodexSessionManager-windows-x64
          - os: macos-latest
            platform: darwin
            arch: x64
            artifact: CodexSessionManager-macos-x64
          - os: macos-latest
            platform: darwin
            arch: arm64
            artifact: CodexSessionManager-macos-arm64
          - os: ubuntu-latest
            platform: linux
            arch: x64
            artifact: CodexSessionManager-linux-x64

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Package app
        run: npm run package -- --platform=${{ matrix.platform }} --arch=${{ matrix.arch }}

      - name: Archive bundle
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p artifacts
          bundle="$(find dist -maxdepth 1 -type d -name "CodexSessionManager-${{ matrix.platform }}-${{ matrix.arch }}" | head -n 1)"
          if [ -z "$bundle" ]; then
            echo "No packaged bundle found in dist" >&2
            find dist -maxdepth 2 -type d >&2 || true
            exit 1
          fi
          tar -czf "artifacts/${{ matrix.artifact }}.tar.gz" -C "$(dirname "$bundle")" "$(basename "$bundle")"

      - name: Upload bundle
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact }}
          path: artifacts/${{ matrix.artifact }}.tar.gz
          if-no-files-found: error
          archive: false

  publish-release:
    name: Publish release
    runs-on: ubuntu-latest
    needs: package

    steps:
      - name: Download packaged bundles
        uses: actions/download-artifact@v5
        with:
          pattern: CodexSessionManager-*
          path: release-assets
          merge-multiple: true

      - name: Show bundled assets
        shell: bash
        run: ls -lah release-assets

      - name: Create or update GitHub release
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ inputs.tag }}
          RELEASE_NAME: ${{ inputs.release_name }}
          RELEASE_NOTES: ${{ inputs.notes }}
          PRERELEASE: ${{ inputs.prerelease }}
          MAKE_LATEST: ${{ inputs.latest }}
          TARGET_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          shopt -s nullglob

          assets=(release-assets/*.tar.gz)
          if [ "${#assets[@]}" -eq 0 ]; then
            echo "No packaged release assets were downloaded." >&2
            exit 1
          fi

          create_args=(--target "$TARGET_SHA")
          if [ -n "$RELEASE_NAME" ]; then
            create_args+=(--title "$RELEASE_NAME")
          else
            create_args+=(--title "$TAG")
          fi

          if [ -n "$RELEASE_NOTES" ]; then
            create_args+=(--notes "$RELEASE_NOTES")
          else
            create_args+=(--generate-notes)
          fi

          if [ "$PRERELEASE" = "true" ]; then
            create_args+=(--prerelease)
          fi

          if [ "$MAKE_LATEST" = "true" ]; then
            create_args+=(--latest)
          fi

          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "Release $TAG already exists. Uploading refreshed assets."
            gh release upload "$TAG" "${assets[@]}" --clobber
          else
            echo "Creating release $TAG from $TARGET_SHA."
            gh release create "$TAG" "${assets[@]}" "${create_args[@]}"
          fi
